<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscription - ShadowComm</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>Inscription</h1>
      <form method="post" class="card form-card">
        <label for="username">Nom de code</label>
        <input type="text" id="username" name="username" required />

        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required />

        <label class="checkbox">
          <input type="checkbox" name="accept_rules" />
          J'accepte les règles de confidentialité.
        </label>

        <button type="submit" class="button">Créer le compte</button>
      </form>

      <p>
        <a href="{{ url_for('auth.login') }}">Déjà un compte ? Connexion</a>
      </p>
      <p><a href="{{ url_for('main.home') }}">Retour à l'accueil</a></p>
    </div>
  </body>
</html>
