<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - ShadowComm</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Chat ShadowComm</h1>
        <p class="intro">Connecté en tant que <strong>{{ session['username'] }}</strong></p>

        <div class="top-actions">
            <a href="{{ url_for('auth.logout') }}" class="button">Déconnexion</a>
            <form method="post" action="{{ url_for('chat.delete_account') }}">
                <button type="submit" class="button danger">Supprimer mon compte</button>
            </form>
        </div>

        <form method="post" class="card form-card">
            <label for="content">Ton message</label>
            <textarea id="content" name="content" rows="4" required></textarea>
            <button type="submit" class="button">Envoyer</button>
        </form>

        <div class="card">
            <h2>Messages</h2>

                    <div class="message">
                        <p><strong>{{ message.username }}</strong> - {{ message.timestamp }}</p>
                        <p>{{ message.content }}</p>
                    </div>
                <p>Aucun message pour le moment.</p>
        </div>
    </div>
</body>
</html>
